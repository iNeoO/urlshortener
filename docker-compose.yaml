services:
  postgres:
    container_name: urlshortener-postgres-dev
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${PG_URLSHORTENER_DB}
      POSTGRES_USER: ${PG_URLSHORTENER_USER}
      POSTGRES_PASSWORD: ${PG_URLSHORTENER_PASSWORD}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    container_name: urlshortener-redis-dev
    image: redis:8-alpine
    command: ["redis-server", "--requirepass", "${REDIS_URLSHORTENER_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  pgdata:
