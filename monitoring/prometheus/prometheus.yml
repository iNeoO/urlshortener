global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets:
          - rabbitmq:15692

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:4000
          - host.docker.internal:4000

  - job_name: redirector
    metrics_path: /metrics
    static_configs:
      - targets:
          - redirector:4001
          - host.docker.internal:4001
