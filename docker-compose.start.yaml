services:
  postgres:
    container_name: urlshortener-postgres-start
    extends:
      file: docker-compose.yaml
      service: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - urlshortener-postgres-network

  redis:
    container_name: urlshortener-redis-start
    extends:
      file: docker-compose.yaml
      service: redis
    networks:
      - urlshortener-postgres-network

  frontend:
    container_name: urlshortener-frontend-start
    env_file:
      - ./.env.docker
    build:
      dockerfile: ./apps/frontend/dockerfile
      args:
        PG_URL: ${PG_URL}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    ports:
      - "127.0.0.1:3001:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - urlshortener-nginx-network

  backend:
    container_name: urlshortener-backend-start
    env_file:
      - ./.env.docker
    build:
      dockerfile: ./apps/backend/dockerfile
      args:
        PG_URL: ${PG_URL}
    ports:
      - "127.0.0.1:3002:4000"
    depends_on:
      - postgres
      - redis
    networks:
      - urlshortener-postgres-network
      - urlshortener-nginx-network

  maildev:
    image: maildev/maildev:2.1.0
    container_name: urlshortener-maildev-start
    ports:
      - "4020:1080"
      - "4025:1025"
    networks:
      - urlshortener-postgres-network

  rabbitmq:
    image: rabbitmq:4-alpine
    container_name: urlshortener-rabbitmq-dev
    ports:
      - "5672:5672"
      - "15672:15672"

  worker:
    container_name: urlshortener-worker-start
    env_file:
      - ./.env.docker
    build:
      dockerfile: ./apps/backend/dockerfile
      args:
        PG_URL: ${PG_URL}
    depends_on:
      - postgres
      - redis
      - backend
    entrypoint: ["/app/scripts/worker.entrypoint.sh"]
    networks:
      - urlshortener-postgres-network

  nginx:
    container_name: urlshortener-nginx-start
    image: nginx:latest
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - urlshortener-nginx-network
    volumes:
      - ./nginx/start.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:

networks:
  urlshortener-redis-network:
    driver: bridge
  urlshortener-postgres-network:
    driver: bridge
  urlshortener-nginx-network:
    driver: bridge
